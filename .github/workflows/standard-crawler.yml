name: Standard PDF Crawler

on:
  schedule:
    - cron: '0 0 * * 1' # Runs at 00:00 every Monday
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

permissions:
  contents: read
  issues: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Crawler
        run: node scripts/crawler/find_standard_pdfs.cjs

      - name: Create Issue if links found
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f scripts/crawler/crawler_results.md ]; then
            gh issue create \
              --title "[Crawler] 發現過期標準潛在新版本 PDF" \
              --body-file scripts/crawler/crawler_results.md \
              --assignee "@me"
          else
            echo "No crawler_results.md found. No new links to report."
          fi
